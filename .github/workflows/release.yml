name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Package Chrome extension
        run: pnpm --filter @otsu/extension package:chrome

      - name: Package Firefox extension
        run: pnpm --filter @otsu/extension package:firefox

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/extension/otsu-wallet-*-chrome.zip
            packages/extension/otsu-wallet-*-firefox.zip
            packages/extension/otsu-wallet-*-firefox-source.zip
          generate_release_notes: true
