name: Publish @otsu/api

on:
  push:
    tags:
      - 'api-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @otsu/api typecheck

      - name: Build
        run: pnpm --filter @otsu/api build

      - name: Publish
        run: pnpm --filter @otsu/api publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
